name: LeadFlow Daily Run

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger LeadFlow Pipeline
        run: |
          curl -s -X POST https://leadflow-ai-production-484e.up.railway.app/api/run-pipeline \
            -H "Content-Type: application/json"
          echo "Pipeline triggered at $(date)"
